<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Poker Online</title>
<script src="/socket.io/socket.io.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --felt: #1a5c35; --felt-dark: #0f3d22; --gold: #f9c74f; --gold-dim: #c49a1a;
  --red: #e63946; --blue: #3a86ff; --chip-green: #43aa8b;
  --text: #f0f0f0; --text-dim: rgba(240,240,240,0.55);
  --panel-border: rgba(255,255,255,0.1);
  --timer-full: 30;
}
html, body { height: 100%; overflow: hidden; background: #0a0a0a; color: var(--text); font-family: system-ui, -apple-system, sans-serif; font-size: 14px; }

/* LOGIN */
#login-screen {
  height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center;
  background: radial-gradient(ellipse at center, #1a5c35 0%, #0a1f13 100%); padding: 2rem; gap: 1.5rem;
}
.logo { font-size: 2.5rem; font-weight: 700; color: var(--gold); text-align: center; }
.logo span { color: #fff; font-weight: 300; }
.login-card {
  background: rgba(0,0,0,0.4); border: 1px solid var(--panel-border); border-radius: 16px;
  padding: 1.5rem; width: 100%; max-width: 340px; display: flex; flex-direction: column; gap: 12px;
}
.login-card label { font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.08em; display: block; margin-bottom: 2px; }
.login-card input { width: 100%; padding: 12px 14px; border-radius: 10px; border: 1px solid var(--panel-border); background: rgba(255,255,255,0.06); color: var(--text); font-size: 15px; }
.login-card input:focus { outline: none; border-color: var(--gold); }
.btn-join { padding: 14px; border-radius: 10px; background: var(--gold); color: #111; font-weight: 700; font-size: 15px; border: none; cursor: pointer; margin-top: 4px; width: 100%; transition: transform 0.1s; }
.btn-join:active { transform: scale(0.97); }
.login-hint { font-size: 12px; color: var(--text-dim); text-align: center; }

/* GAME SCREEN */
#game-screen { height: 100vh; display: none; flex-direction: column; background: radial-gradient(ellipse at 50% 40%, var(--felt) 0%, var(--felt-dark) 100%); overflow: hidden; }

/* TOPBAR */
.topbar { display: flex; justify-content: space-between; align-items: center; padding: 4px 12px; background: rgba(0,0,0,0.35); border-bottom: 1px solid var(--panel-border); flex-shrink: 0; }
.room-id { font-size: 10px; color: var(--text-dim); }
.room-phase { font-size: 13px; font-weight: 600; }
.pot-label { font-size: 10px; color: var(--text-dim); text-align: center; }
.pot-value { font-size: 15px; font-weight: 700; color: var(--gold); text-align: center; transition: transform 0.3s; }
.pot-value.bump { animation: potBump 0.4s ease; }
@keyframes potBump { 0%{transform:scale(1)} 50%{transform:scale(1.25)} 100%{transform:scale(1)} }
.hand-info { font-size: 11px; color: var(--text-dim); text-align: right; }

/* TABLE AREA */
.table-area { flex: 1; display: flex; flex-direction: column; min-height: 0; overflow: hidden; }

/* OPPONENTS */
.opponents-row { display: flex; justify-content: space-around; flex-wrap: wrap; padding: 3px 6px 1px; gap: 3px; flex-shrink: 0; }
.opponent { display: flex; flex-direction: column; align-items: center; gap: 1px; min-width: 52px; position: relative; }

/* Avatar with timer ring */
.avatar-wrap { position: relative; width: 36px; height: 36px; }
.opp-avatar {
  width: 34px; height: 34px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-weight: 700; font-size: 11px; border: 2px solid transparent;
  position: relative; z-index: 1;
  transition: border-color 0.3s, box-shadow 0.3s;
}
.opp-avatar.active-turn { border-color: var(--gold); box-shadow: 0 0 8px var(--gold-dim); }
.opp-avatar.folded-player { opacity: 0.3; }
.opp-avatar.away-player { opacity: 0.5; border-color: rgba(255,255,255,0.2) !important; }

/* SVG timer ring */
.timer-ring { position: absolute; top: -1px; left: -1px; width: 36px; height: 36px; transform: rotate(-90deg); pointer-events: none; }
.timer-ring circle { fill: none; stroke: var(--gold); stroke-width: 2.5; stroke-linecap: round;
  stroke-dasharray: 100; stroke-dashoffset: 100; transition: stroke-dashoffset 1s linear, stroke 0.5s; }
.timer-ring circle.warning { stroke: var(--red); }

.opp-name { font-size: 8px; color: var(--text-dim); max-width: 60px; text-align: center; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.opp-chips-val { font-size: 9px; color: var(--gold); font-weight: 600; }
.opp-bet { font-size: 9px; color: var(--chip-green); }

/* Chip stack visual */
.chip-stack-visual { display: flex; flex-direction: column-reverse; align-items: center; gap: 0; height: 16px; justify-content: flex-end; }
.chip-disc { width: 20px; height: 3px; border-radius: 2px; margin-bottom: 1px; opacity: 0.9; }

.opp-cards-back { display: flex; gap: 2px; }
.card-back-small { width: 14px; height: 20px; border-radius: 2px; background: linear-gradient(135deg, #1a3a8f, #0d2060); border: 1px solid rgba(255,255,255,0.2); }
.badge-row { display: flex; gap: 2px; flex-wrap: wrap; justify-content: center; }
.badge { font-size: 7px; padding: 1px 4px; border-radius: 3px; font-weight: 700; }
.badge-dealer { background: rgba(249,199,79,0.25); color: var(--gold); }
.badge-sb { background: rgba(58,134,255,0.25); color: #7ec8fb; }
.badge-bb { background: rgba(249,199,79,0.15); color: #f9c74f; }
.badge-allin { background: rgba(230,57,70,0.3); color: #ff9a9e; }
.badge-fold { background: rgba(255,255,255,0.07); color: rgba(255,255,255,0.4); }
.badge-buyin { background: rgba(230,57,70,0.25); color: #ff9a9e; border: 1px solid rgba(230,57,70,0.3); font-size: 8px; padding: 1px 5px; border-radius: 10px; font-weight: 700; }

/* Bet animation bubble */
.bet-bubble {
  position: absolute; top: -8px; right: -8px;
  background: var(--chip-green); color: #fff; font-size: 8px; font-weight: 700;
  border-radius: 10px; padding: 1px 5px; z-index: 2;
  animation: popIn 0.3s ease;
}
@keyframes popIn { 0%{transform:scale(0)} 70%{transform:scale(1.2)} 100%{transform:scale(1)} }

/* CENTER */
.center-area { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; min-height: 0; padding: 1px 4px; }
.phase-label { font-size: 9px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.1em; }
.community-cards { display: flex; gap: 4px; }

/* Cards with animation */
.card {
  width: 36px; height: 50px; border-radius: 5px; background: #fff; border: 1px solid #ccc;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  color: #111; font-weight: 700; font-size: 13px; line-height: 1; gap: 1px; flex-shrink: 0;
  box-shadow: 0 2px 6px rgba(0,0,0,0.4);
  transition: transform 0.2s;
}
.card.new-card { animation: dealCard 0.35s ease forwards; }
@keyframes dealCard {
  0% { transform: translateY(-40px) scale(0.7); opacity: 0; }
  100% { transform: translateY(0) scale(1); opacity: 1; }
}
.card:nth-child(1).new-card { animation-delay: 0s; }
.card:nth-child(2).new-card { animation-delay: 0.07s; }
.card:nth-child(3).new-card { animation-delay: 0.14s; }
.card:nth-child(4).new-card { animation-delay: 0.21s; }
.card:nth-child(5).new-card { animation-delay: 0.28s; }
.card .suit { font-size: 10px; }
.card.red .rank, .card.red .suit { color: var(--red); }
.card.empty { background: rgba(255,255,255,0.06); border: 1.5px dashed rgba(255,255,255,0.2); box-shadow: none; }

.pot-chip {
  background: rgba(0,0,0,0.4); border: 1px solid rgba(249,199,79,0.4);
  border-radius: 20px; padding: 3px 14px; font-size: 11px; color: var(--gold); font-weight: 600;
  box-shadow: 0 0 12px rgba(249,199,79,0.15);
}
.status-msg { font-size: 11px; color: var(--text-dim); text-align: center; }

/* Pulsing "your turn" */
.your-turn-msg { font-size: 12px; font-weight: 700; color: var(--gold); text-align: center; animation: pulse 1.2s ease-in-out infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }

/* Timer bar for my turn */
.my-timer-bar { height: 3px; border-radius: 2px; background: var(--gold); width: 100%; transition: width 1s linear, background 0.5s; margin: 2px 0; }
.my-timer-bar.warning { background: var(--red); }

.winner-banner {
  background: rgba(249,199,79,0.12); border: 1px solid rgba(249,199,79,0.35);
  border-radius: 10px; padding: 6px 12px; text-align: center; font-size: 12px;
  color: var(--gold); font-weight: 600; max-width: 92%;
  animation: fadeInUp 0.4s ease;
}
@keyframes fadeInUp { from{transform:translateY(10px);opacity:0} to{transform:translateY(0);opacity:1} }

/* RESULTS TABLE */
.results-banner {
  background: rgba(0,0,0,0.45); border: 1px solid var(--panel-border);
  border-radius: 10px; padding: 8px; width: 92%; max-width: 320px;
  animation: fadeInUp 0.4s ease 0.3s both;
}
.results-title { font-size: 10px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 4px; text-align: center; }
.results-table { width: 100%; border-collapse: collapse; font-size: 11px; }
.results-table th { color: var(--text-dim); font-weight: 600; text-align: left; padding: 3px 6px; border-bottom: 1px solid var(--panel-border); font-size: 10px; text-transform: uppercase; }
.results-table td { padding: 3px 6px; border-bottom: 1px solid rgba(255,255,255,0.04); }
.results-table tr:last-child td { border-bottom: none; }
.win-row td { color: var(--gold); }
.lose-row td { color: var(--text-dim); }
.delta-pos { color: #43aa8b; font-weight: 700; }
.delta-neg { color: var(--red); font-weight: 700; }

/* MY AREA */
.my-area { background: rgba(0,0,0,0.3); border-top: 1px solid var(--panel-border); flex-shrink: 0; }
.my-hand-row { display: flex; align-items: center; justify-content: space-between; padding: 5px 12px 3px; }
.my-info .my-name { font-weight: 600; font-size: 12px; }
.my-info .my-chips { font-size: 11px; color: var(--gold); }
.my-info .my-bet { font-size: 10px; color: var(--chip-green); }
.my-cards-row { display: flex; gap: 5px; }
.my-cards-row .card { width: 40px; height: 55px; }
.my-cards-row .card.new-card { animation: dealMyCard 0.4s ease forwards; }
@keyframes dealMyCard {
  0% { transform: translateY(30px) scale(0.8); opacity: 0; }
  100% { transform: translateY(0) scale(1); opacity: 1; }
}
.my-cards-row .card:nth-child(2).new-card { animation-delay: 0.12s; }

/* My chip stack visual */
.my-chip-stack { display: flex; gap: 2px; align-items: flex-end; margin-top: 2px; }

/* ACTIONS */
.actions-area { padding: 0 8px 6px; display: flex; flex-direction: column; gap: 4px; }
.raise-row { display: flex; align-items: center; gap: 8px; }
.raise-row input[type=range] { flex: 1; accent-color: var(--gold); }
.raise-val { font-size: 12px; font-weight: 600; color: var(--gold); min-width: 55px; text-align: right; }
.action-btns { display: flex; gap: 5px; }
.action-btn {
  flex: 1; padding: 9px 2px; border-radius: 10px; border: none;
  font-size: 12px; font-weight: 700; cursor: pointer; font-family: inherit;
  transition: transform 0.1s, opacity 0.15s;
}
.action-btn:active { transform: scale(0.95); }
.action-btn:disabled { opacity: 0.35; }
.btn-fold-a { background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.8); }
.btn-check-a, .btn-call-a { background: var(--blue); color: #fff; }
.btn-raise-a { background: var(--gold); color: #111; }
.btn-allin-a { background: var(--red); color: #fff; }
.btn-start { background: var(--gold); color: #111; font-weight: 700; padding: 10px; border-radius: 10px; border: none; font-size: 13px; width: 100%; cursor: pointer; transition: transform 0.1s; }
.btn-start:active { transform: scale(0.97); }
.btn-start:disabled { opacity: 0.4; }

/* INLINE CHAT */
.inline-chat { flex-shrink: 0; border-top: 1px solid var(--panel-border); background: rgba(0,0,0,0.2); display: flex; flex-direction: column; height: 105px; transition: height 0.25s ease; }
.inline-chat.collapsed { height: 28px; }
.inline-chat.collapsed .inline-chat-msgs, .inline-chat.collapsed .inline-chat-input { display: none; }
.chat-toggle { display:flex; align-items:center; justify-content:space-between; padding: 3px 10px; cursor:pointer; flex-shrink:0; }
.chat-toggle-label { font-size:10px; color:var(--text-dim); text-transform:uppercase; letter-spacing:0.05em; }
.chat-toggle-icon { font-size:10px; color:var(--text-dim); }
.inline-chat-msgs { flex: 1; overflow-y: auto; padding: 3px 10px; display: flex; flex-direction: column; gap: 1px; }
.inline-msg { font-size: 11px; line-height: 1.4; }
.inline-msg .msender { color: var(--gold); font-weight: 600; margin-right: 4px; }
.inline-msg.system-msg { color: var(--text-dim); font-style: italic; font-size: 10px; }
.inline-msg.mine-msg .msender { color: #7ec8fb; }
.inline-chat-input { display: flex; gap: 6px; padding: 3px 8px 5px; flex-shrink: 0; }
.inline-chat-input input { flex: 1; padding: 5px 10px; border-radius: 16px; border: 1px solid var(--panel-border); background: rgba(255,255,255,0.07); color: var(--text); font-size: 12px; }
.inline-chat-input input:focus { outline: none; border-color: var(--gold); }
.inline-chat-send { padding: 5px 12px; border-radius: 16px; background: var(--gold); color: #111; border: none; font-weight: 700; cursor: pointer; font-size: 12px; }

/* TABS */
.tabs { display: flex; background: rgba(0,0,0,0.5); border-top: 1px solid var(--panel-border); flex-shrink: 0; }
.tab-btn { flex: 1; padding: 8px 4px 7px; background: none; border: none; color: var(--text-dim); font-size: 10px; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 2px; font-family: inherit; text-transform: uppercase; position: relative; transition: color 0.2s; }
.tab-btn.active { color: var(--gold); }
.tab-icon { font-size: 20px; line-height: 1; }

/* PANELS */
.panel { display: none; flex-direction: column; flex: 1; min-height: 0; overflow-y: auto; }
.panel.active { display: flex; }

/* PLAYERS */
.players-panel { padding: 10px; gap: 8px; }
.player-row { display: flex; align-items: center; gap: 10px; background: rgba(255,255,255,0.05); border-radius: 10px; padding: 10px 12px; border: 1px solid var(--panel-border); transition: background 0.2s; }
.player-avatar { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 12px; flex-shrink: 0; }
.player-details { flex: 1; }
.player-name { font-weight: 600; font-size: 13px; }
.player-chips-label { font-size: 11px; color: var(--gold); }
.player-status { font-size: 10px; color: var(--text-dim); }
.you-badge, .host-badge { font-size: 9px; padding: 1px 5px; border-radius: 4px; margin-left: 4px; }
.you-badge { background: rgba(249,199,79,0.2); color: var(--gold); }
.host-badge { background: rgba(58,134,255,0.2); color: #7ec8fb; }
.btn-kick { background: rgba(230,57,70,0.2); color: #ff9a9e; border: 1px solid rgba(230,57,70,0.3); border-radius: 8px; padding: 5px 10px; font-size: 11px; font-weight: 700; cursor: pointer; flex-shrink: 0; }

/* SETTINGS */
.settings-panel { padding: 12px; gap: 10px; }
.settings-section { background: rgba(255,255,255,0.05); border: 1px solid var(--panel-border); border-radius: 12px; padding: 14px; display: flex; flex-direction: column; gap: 10px; }
.settings-title { font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-dim); }
.settings-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
.settings-row label { font-size: 13px; }
.settings-input { width: 100px; padding: 7px 10px; border-radius: 8px; border: 1px solid var(--panel-border); background: rgba(255,255,255,0.07); color: var(--text); font-size: 13px; text-align: right; }
.settings-input:focus { outline: none; border-color: var(--gold); }
.settings-input:disabled { opacity: 0.4; }
.btn-settings-save { background: var(--gold); color: #111; font-weight: 700; padding: 10px; border-radius: 10px; border: none; font-size: 13px; cursor: pointer; width: 100%; }
.settings-note { font-size: 11px; color: var(--text-dim); }

/* TOAST */
.toast { position: fixed; top: 50px; left: 50%; transform: translateX(-50%); background: rgba(230,57,70,0.92); color: #fff; padding: 7px 16px; border-radius: 20px; font-size: 13px; font-weight: 600; z-index: 100; opacity: 0; transition: opacity 0.3s; pointer-events: none; white-space: nowrap; }
.toast.show { opacity: 1; }

/* Chip colors */
.cc1{background:#e63946} .cc2{background:#f9c74f} .cc3{background:#3a86ff} .cc4{background:#43aa8b} .cc5{background:#8338ec}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="logo">♠ Poker<span> Online</span></div>
  <div class="login-card">
    <div><label>Twoje imię</label><input type="text" id="input-name" placeholder="np. Marek" maxlength="20" autocomplete="off"></div>
    <div><label>Kod pokoju</label><input type="text" id="input-room" placeholder="np. KUMPLE" maxlength="12" autocomplete="off" style="text-transform:uppercase"></div>
    <button class="btn-join" onclick="joinRoom()">Dołącz do stołu →</button>
  </div>
  <div class="login-hint">Wpisz ten sam kod co znajomi, żeby grać razem</div>
</div>

<!-- GAME -->
<div id="game-screen">
  <div class="topbar">
    <div><div class="room-id" id="topbar-room"></div><div class="room-phase" id="topbar-phase"></div></div>
    <div><div class="pot-label">POT</div><div class="pot-value" id="topbar-pot">0 zł</div></div>
    <div class="hand-info" id="topbar-hand"></div>
  </div>

  <div id="panel-game" style="flex:1;min-height:0;display:flex;flex-direction:column;overflow:hidden;">
    <div class="table-area">
      <div class="opponents-row" id="opponents-row"></div>
      <div class="center-area">
        <div class="phase-label" id="phase-label"></div>
        <div class="community-cards" id="community-cards"></div>
        <div class="pot-chip" id="center-pot" style="display:none"></div>
        <div id="turn-timer-wrap" style="display:none;width:85%;max-width:220px;">
          <div style="display:flex;align-items:center;gap:8px;">
            <div class="my-timer-bar" id="my-timer-bar" style="flex:1"></div>
            <div id="timer-count" style="font-size:13px;font-weight:700;color:var(--gold);min-width:24px;text-align:right;">30</div>
          </div>
        </div>
        <div class="status-msg" id="status-msg"></div>
        <div class="winner-banner" id="winner-banner" style="display:none"></div>
        <div class="results-banner" id="results-banner" style="display:none"></div>
      </div>
      <div class="my-area">
        <div class="my-hand-row">
          <div class="my-info">
            <div class="my-name" id="my-name"></div>
            <div class="my-chips" id="my-chips"></div>
            <div id="my-chip-stack-wrap"></div>
            <div class="my-bet" id="my-bet"></div>
            <div id="my-buyins" style="font-size:10px;color:#ff9a9e;font-weight:600;"></div>
          </div>
          <div class="my-cards-row" id="my-cards"></div>
        </div>
        <div class="actions-area" id="actions-area"></div>
      </div>
    </div>
    <div class="inline-chat" id="inline-chat">
      <div class="chat-toggle" onclick="toggleChat()">
        <span class="chat-toggle-label">💬 Czat</span>
        <span class="chat-toggle-icon" id="chat-toggle-icon">▲</span>
      </div>
      <div class="inline-chat-msgs" id="chat-messages"></div>
      <div class="inline-chat-input">
        <input type="text" id="chat-input" placeholder="Napisz..." maxlength="200" autocomplete="off">
        <button class="inline-chat-send" onclick="sendChat()">Wyślij</button>
      </div>
    </div>
  </div>

  <div id="panel-players" class="panel players-panel"></div>
  <div id="panel-settings" class="panel settings-panel"></div>

  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('game',this)"><span class="tab-icon">🃏</span>Gra</button>
    <button class="tab-btn" onclick="switchTab('players',this)"><span class="tab-icon">👥</span>Gracze</button>
    <button class="tab-btn" onclick="switchTab('settings',this)" id="tab-settings" style="display:none"><span class="tab-icon">⚙️</span>Host</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const COLORS = ['#3a86ff','#ff006e','#fb5607','#8338ec','#06d6a0','#ef476f','#ffd166'];
const CHIP_COLORS = ['cc1','cc2','cc3','cc4','cc5'];
function avatarColor(n) { let h=0; for(let c of n) h=(h*31+c.charCodeAt(0))%COLORS.length; return COLORS[h]; }
function initials(n) { return n.slice(0,2).toUpperCase(); }
function fmtChips(n) { return (+n).toLocaleString('pl-PL')+' zł'; }
function cardColor(s) { return (s==='♥'||s==='♦') ? 'red' : ''; }

// Chip stack visual - returns HTML string of disc elements
function chipStackHTML(chips, maxChips) {
  if (!chips || chips <= 0) return '';
  const pct = Math.min(1, chips / (maxChips || 5000));
  const numDiscs = Math.max(1, Math.round(pct * 6));
  let html = '<div class="chip-stack-visual">';
  for (let i = 0; i < numDiscs; i++) {
    const cc = CHIP_COLORS[i % CHIP_COLORS.length];
    html += '<div class="chip-disc '+cc+'"></div>';
  }
  return html + '</div>';
}

let socket, myId, myName, myRoom, gameState, amHost=false;
let prevCommunityCount = 0;
let prevPot = 0;
let timerInterval = null;
let timerStart = null;
let TURN_SECONDS = 30;

function joinRoom() {
  const name = document.getElementById('input-name').value.trim();
  const room = document.getElementById('input-room').value.trim().toUpperCase();
  if (!name || !room) { showToast('Wpisz imię i kod pokoju'); return; }
  myName = name; myRoom = room;

  socket = io({
    reconnection: true,
    reconnectionAttempts: Infinity,
    reconnectionDelay: 1000,
    reconnectionDelayMax: 5000,
    timeout: 20000
  });

  socket.on('connect', () => {
    myId = socket.id;
    socket.emit('join_room', { roomId: room, name });
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('game-screen').style.display = 'flex';
    document.getElementById('topbar-room').textContent = 'Pokój: ' + room;
  });

  socket.on('reconnect', () => {
    myId = socket.id;
    socket.emit('join_room', { roomId: myRoom, name: myName });
  });

  socket.on('game_state', (state) => {
    const me = state.players.find(p => p.name === myName);
    if (me) myId = me.id;
    gameState = state;
    amHost = !!state.isHost;
    document.getElementById('tab-settings').style.display = amHost ? '' : 'none';
    renderGame(state);
    renderSettings(state);
  });

  socket.on('chat_history', (msgs) => msgs.forEach(addChatMsg));
  socket.on('chat_message', (msg) => addChatMsg(msg));
  socket.on('error_msg', (msg) => showToast(msg));
  socket.on('kicked', ({ reason }) => {
    document.getElementById('game-screen').style.display = 'none';
    document.getElementById('login-screen').style.display = 'flex';
    showToast(reason || 'Zostałeś wyrzucony');
    socket.disconnect();
  });

  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible' && socket) {
      if (!socket.connected) socket.connect();
      else socket.emit('join_room', { roomId: myRoom, name: myName });
    }
  });
  window.addEventListener('focus', () => {
    if (socket && myRoom) {
      if (!socket.connected) socket.connect();
      else socket.emit('join_room', { roomId: myRoom, name: myName });
    }
  });
}

function renderGame(state) {
  const me = state.players.find(p => p.id === myId);
const phaseNames = { waiting:'Oczekiwanie', preflop:'Pre-flop', flop:'Flop', turn:'Turn', river:'River', showdown:'Showdown' };
  const maxChips = Math.max(...state.players.map(p => p.chips), 1);

  // Topbar
  document.getElementById('topbar-phase').textContent = phaseNames[state.phase] || state.phase;
  const potEl = document.getElementById('topbar-pot');
  if (state.pot !== prevPot) {
    potEl.classList.remove('bump');
    void potEl.offsetWidth;
    potEl.classList.add('bump');
    prevPot = state.pot;
  }
  potEl.textContent = fmtChips(state.pot);
  document.getElementById('topbar-hand').textContent = state.handNum > 0 ? '#'+state.handNum : '';

  const cp = document.getElementById('center-pot');
  if (state.pot > 0) { cp.style.display=''; cp.textContent='💰 '+fmtChips(state.pot); } else cp.style.display='none';
  document.getElementById('phase-label').textContent = phaseNames[state.phase]||'';

  // Community cards — animate new ones
  const cc = document.getElementById('community-cards');
  const newCount = state.community.length;
  cc.innerHTML = '';
  for (let i=0; i<5; i++) {
    const card = state.community[i];
    const el = document.createElement('div');
    if (card) {
      el.className = 'card ' + cardColor(card.suit) + (i >= prevCommunityCount ? ' new-card' : '');
      el.innerHTML = '<span class="rank">'+card.rank+'</span><span class="suit">'+card.suit+'</span>';
    } else {
      el.className = 'card empty';
    }
    cc.appendChild(el);
  }
  prevCommunityCount = newCount;

  // Hide results when not showdown
  if (state.phase !== 'showdown') {
    const rb = document.getElementById('results-banner');
    if (rb) rb.style.display = 'none';
  }

  // Status / winner
  const statusEl = document.getElementById('status-msg');
  const winnerEl = document.getElementById('winner-banner');
  const timerWrap = document.getElementById('turn-timer-wrap');
  winnerEl.style.display='none'; statusEl.textContent=''; statusEl.className='status-msg';
  timerWrap.style.display='none';
  clearTimer();

  if (state.phase==='waiting') {
    statusEl.textContent = state.players.length<2 ? 'Czekaj na innych graczy...' : '';
  } else if (state.phase==='showdown' && state.winners) {
    winnerEl.style.display='';
    const winnerHtml = state.winners.map(w => {
      const cardStr = (w.showCards && w.cards && w.cards.length) ? ' ['+w.cards.map(c=>c.rank+c.suit).join(' ')+']' : '';
      const prefix = w.isWinner ? '🏆 ' : '';
      const bold = w.isWinner ? '<strong>' : '<span style="opacity:0.65">';
      const boldEnd = w.isWinner ? '</strong>' : '</span>';
      const handLabel = w.showCards ? ': '+w.hand : ': (karty ukryte)';
      return prefix+bold+w.name+boldEnd+handLabel+cardStr;
    }).join('<br>');
    winnerEl.innerHTML = winnerHtml;
    // Results table
    const rb = document.getElementById('results-banner');
    if (rb && state.chipsBeforeHand) {
      rb.style.display='';
      const rows = state.players.map(p => {
        const before = state.chipsBeforeHand[p.id] !== undefined ? state.chipsBeforeHand[p.id] : p.chips;
        const delta = p.chips - before;
        const deltaStr = delta > 0
          ? '<span class="delta-pos">+'+delta.toLocaleString('pl-PL')+' zł</span>'
          : delta < 0 ? '<span class="delta-neg">'+delta.toLocaleString('pl-PL')+' zł</span>'
          : '<span style="color:var(--text-dim)">—</span>';
        return '<tr class="'+(delta>0?'win-row':delta<0?'lose-row':'')+'"><td>'+p.name+'</td><td>'+p.chips.toLocaleString('pl-PL')+' zł</td><td>'+deltaStr+'</td></tr>';
      }).join('');
      rb.innerHTML = '<div class="results-title">📊 Wyniki rozdania #'+state.handNum+'</div>'
        +'<table class="results-table"><thead><tr><th>Gracz</th><th>Stack</th><th>Zmiana</th></tr></thead><tbody>'+rows+'</tbody></table>';
    }
  } else if (state.currentPlayerId===myId) {
    statusEl.className='your-turn-msg'; statusEl.textContent='⬆ Twoja kolej!';
    timerWrap.style.display='';
    startTimer();
  } else {
    const cur=state.players.find(p=>p.id===state.currentPlayerId);
    if (cur) statusEl.textContent='Tura: '+cur.name;
  }

  // Opponents
  const oRow=document.getElementById('opponents-row');
  oRow.innerHTML='';
  state.players.filter(p=>p.id!==myId).forEach(p => {
    const isActive=state.currentPlayerId===p.id;
    const pIdx=state.players.findIndex(q=>q.id===p.id);
    const sbIdx=(state.dealerIndex+1)%state.players.length;
    const bbIdx=(state.dealerIndex+2)%state.players.length;
    const badges=[];
    if (p.isDealer) badges.push('<span class="badge badge-dealer">D</span>');
    if (pIdx===sbIdx) badges.push('<span class="badge badge-sb">SB</span>');
    if (pIdx===bbIdx) badges.push('<span class="badge badge-bb">BB</span>');
    if (p.allIn) badges.push('<span class="badge badge-allin">AI</span>');
    if (p.folded) badges.push('<span class="badge badge-fold">F</span>');
    if (p.buyins > 0) badges.push('<span class="badge badge-buyin">+'+p.buyins+'x</span>');
    const isAway = p.connected === 'away';

    // Timer ring for active player
    const ringPct = isActive ? 100 : 0;
    const timerRing = isActive ? `<svg class="timer-ring" viewBox="0 0 36 36">
      <circle cx="18" cy="18" r="15.9" stroke-dasharray="100" stroke-dashoffset="0" id="ring-${p.id}"/>
    </svg>` : '';

    const div=document.createElement('div');
    div.className='opponent';
    div.innerHTML=
      '<div class="avatar-wrap">'
      +'<div class="opp-avatar'+(isActive?' active-turn':'')+(p.folded?' folded-player':'')+(isAway?' away-player':'')+'" style="background:'+avatarColor(p.name)+'33;color:'+avatarColor(p.name)+(isActive?';border-color:var(--gold)':'')+'">'
      +initials(p.name)+'</div>'+timerRing
      +(p.bet>0?'<div class="bet-bubble">'+p.bet+'</div>':'')
      +'</div>'
      +'<div class="opp-name">'+p.name+(isAway?' 📵':'')+'</div>'
      +(p.buyins>0?'<div style="font-size:8px;color:#ff9a9e;font-weight:600;">Dokup: '+p.buyins+'x</div>':'')
      +chipStackHTML(p.chips, maxChips)
      +'<div class="opp-chips-val">'+fmtChips(p.chips)+'</div>'
      +(badges.length?'<div class="badge-row">'+badges.join('')+'</div>':'')
      +(!p.folded&&p.cardCount>0?'<div class="opp-cards-back">'+Array(p.cardCount).fill('<div class="card-back-small"></div>').join('')+'</div>':'');
    oRow.appendChild(div);
  });

  // My area
  if (me) {
    document.getElementById('my-name').textContent=me.name+(me.isDealer?' 🎯':'');
    document.getElementById('my-chips').textContent=fmtChips(me.chips);
    document.getElementById('my-chip-stack-wrap').innerHTML=chipStackHTML(me.chips, maxChips);
    document.getElementById('my-bet').textContent=me.bet>0?'Bet: '+fmtChips(me.bet):'';
    const buyinEl = document.getElementById('my-buyins');
    if (buyinEl) buyinEl.textContent = me.buyins > 0 ? 'Dokupienia: '+me.buyins+'x' : '';
    const myCards=document.getElementById('my-cards');
    if (me.cards && me.cards.length > 0) {
      // Re-render if card count changed or cards are different
      const currentCards = myCards.querySelectorAll('.card:not(.empty)');
      const needsUpdate = currentCards.length !== me.cards.length;
      if (needsUpdate) {
        myCards.innerHTML='';
        me.cards.forEach((c) => {
          const el=document.createElement('div');
          el.className='card '+cardColor(c.suit)+' new-card';
          el.innerHTML='<span class="rank">'+c.rank+'</span><span class="suit">'+c.suit+'</span>';
          myCards.appendChild(el);
        });
      }
    } else {
      myCards.innerHTML='';
    }
  }

  renderActions(state, me, maxChips);
  renderPlayersList(state, maxChips);
}

// Timer
function startTimer() {
  clearTimer();
  timerStart = Date.now();
  const bar = document.getElementById('my-timer-bar');
  const countEl = document.getElementById('timer-count');
  bar.style.width='100%'; bar.className='my-timer-bar';
  if (countEl) { countEl.textContent=TURN_SECONDS; countEl.style.color='var(--gold)'; }
  timerInterval = setInterval(() => {
    const elapsed = (Date.now() - timerStart) / 1000;
    const remaining = Math.max(0, TURN_SECONDS - elapsed);
    const pct = Math.max(0, 100 - (elapsed / TURN_SECONDS * 100));
    bar.style.width = pct + '%';
    if (countEl) { countEl.textContent=Math.ceil(remaining); }
    if (pct < 30) { bar.className='my-timer-bar warning'; if(countEl) countEl.style.color='var(--red)'; }
    if (pct <= 0) clearTimer();
  }, 200);
}
function clearTimer() {
  if (timerInterval) { clearInterval(timerInterval); timerInterval=null; }
}

function renderActions(state, me, maxChips) {
  const area=document.getElementById('actions-area');
  area.innerHTML='';
  if (me && me.chips <= 0 && state.phase === 'waiting') {
    const buyinDiv=document.createElement('div'); buyinDiv.style.cssText='display:flex;gap:6px;align-items:center;';
    const buyinInput=document.createElement('input');
    buyinInput.type='number'; buyinInput.min='100'; buyinInput.value=state.startingChips||2000;
    buyinInput.style.cssText='flex:1;padding:8px;border-radius:8px;border:1px solid var(--panel-border);background:rgba(255,255,255,0.07);color:var(--text);font-size:13px;';
    const buyinBtn=mkBtn('💰 Dokup żetony','btn-call-a',()=>socket.emit('buyin',{amount:+buyinInput.value}));
    buyinDiv.appendChild(buyinInput); buyinDiv.appendChild(buyinBtn); area.appendChild(buyinDiv); return;
  }
  if (state.phase==='showdown') return;
  if (state.phase==='waiting') {
    const hasEnough=state.players.filter(p=>p.chips>0).length>=2;
    if (state.handNum===0) {
      const btn=mkBtn('🎰 Rozpocznij grę','btn-start',()=>socket.emit('start_game'));
      btn.style.width='100%'; if(!hasEnough) btn.disabled=true; area.appendChild(btn);
    } else {
      const readyPlayers=state.readyPlayers||[];
      const activePlayers=state.players.filter(p=>p.chips>0);
      const readyCount=activePlayers.filter(p=>readyPlayers.includes(p.id)).length;
      const iAmReady=state.iAmReady||false;
      if (!iAmReady) {
        const btn=mkBtn('✅ Gotowy na następne rozdanie','btn-start',()=>socket.emit('new_hand'));
        btn.style.width='100%'; if(!hasEnough) btn.disabled=true; area.appendChild(btn);
      } else {
        const d=document.createElement('div');
        d.style.cssText='text-align:center;padding:8px;background:rgba(255,255,255,0.05);border-radius:10px;';
        d.innerHTML='<div style="font-size:13px;color:var(--gold);font-weight:600;">✅ Jesteś gotowy</div>'
          +'<div style="font-size:11px;color:var(--text-dim);margin-top:3px;">Czekam: '+readyCount+'/'+activePlayers.length+'</div>'
          +'<div style="display:flex;gap:4px;flex-wrap:wrap;justify-content:center;margin-top:5px;">'
          +activePlayers.map(p=>{const r=readyPlayers.includes(p.id);return '<span style="font-size:10px;padding:2px 8px;border-radius:10px;background:'+(r?'rgba(67,170,139,0.3)':'rgba(255,255,255,0.07)')+';color:'+(r?'#43aa8b':'var(--text-dim)')+'">'+p.name+(r?' ✅':' ⏳')+'</span>';}).join('')
          +'</div>';
        area.appendChild(d);
      }
    }
    return;
  }
  if (!me||me.folded||me.allIn||state.currentPlayerId!==myId) return;
  const canCheck=me.bet>=state.currentBet;
  const callAmt=Math.min(state.currentBet-me.bet,me.chips);
  const maxRaise=me.bet+me.chips;
  const minR=Math.min(state.currentBet+state.minRaise,maxRaise);
  if (me.chips>callAmt) {
    const row=document.createElement('div'); row.className='raise-row';
    const slider=document.createElement('input');
    slider.type='range'; slider.min=minR; slider.max=maxRaise; slider.value=minR; slider.step=state.bigBlind;
    const val=document.createElement('span'); val.className='raise-val'; val.textContent=fmtChips(minR);
    slider.oninput=()=>val.textContent=fmtChips(+slider.value);
    row.appendChild(slider); row.appendChild(val); area.appendChild(row);
    const btns=document.createElement('div'); btns.className='action-btns';
    btns.appendChild(mkBtn('Fold','btn-fold-a',()=>action('fold')));
    btns.appendChild(canCheck?mkBtn('Check','btn-check-a',()=>action('check')):mkBtn('Call '+fmtChips(callAmt),'btn-call-a',()=>action('call')));
    btns.appendChild(mkBtn('Raise','btn-raise-a',()=>action('raise',+slider.value)));
    btns.appendChild(mkBtn('All In','btn-allin-a',()=>action('allIn')));
    area.appendChild(btns);
  } else {
    const btns=document.createElement('div'); btns.className='action-btns';
    btns.appendChild(mkBtn('Fold','btn-fold-a',()=>action('fold')));
    btns.appendChild(canCheck?mkBtn('Check','btn-check-a',()=>action('check')):mkBtn('All In '+fmtChips(me.chips),'btn-allin-a',()=>action('allIn')));
    area.appendChild(btns);
  }
}

function mkBtn(text,cls,fn) {
  const b=document.createElement('button');
  b.className='action-btn '+cls; b.textContent=text; b.onclick=fn; return b;
}
function action(type,amount) { clearTimer(); socket.emit('player_action',{action:type,amount}); }

function renderPlayersList(state, maxChips) {
  const panel=document.getElementById('panel-players');
  panel.innerHTML='';
  state.players.forEach(p=>{
    const div=document.createElement('div'); div.className='player-row';
    const status=p.folded?'Fold':p.allIn?'All In':p.connected==='away'?'📵 Away':p.connected===false?'Rozłączony':'W grze';
    const kickBtn=(amHost&&p.id!==myId)?'<button class="btn-kick" onclick="kickPlayer(\''+p.id+'\')">Wyrzuć</button>':'';
    div.innerHTML='<div class="player-avatar" style="background:'+avatarColor(p.name)+'33;color:'+avatarColor(p.name)+'">'+initials(p.name)+'</div>'
      +'<div class="player-details"><div class="player-name">'+p.name
      +(p.id===myId?'<span class="you-badge">Ty</span>':'')
      +(state.isHost&&p.id===myId?'<span class="host-badge">HOST</span>':'')
      +'</div>'
      +chipStackHTML(p.chips, maxChips||5000)
      +(p.buyins>0?'<div style="font-size:10px;color:#ff9a9e;font-weight:600;">Dokupienia: '+p.buyins+'x</div>':'')+'<div class="player-chips-label">'+fmtChips(p.chips)+'</div>'
      +'<div class="player-status">'+status+(p.isDealer?' · D':'')+'</div></div>'+kickBtn;
    panel.appendChild(div);
  });
}

function kickPlayer(id) { if(confirm('Na pewno wyrzucić?')) socket.emit('kick_player',{playerId:id}); }

function renderSettings(state) {
  const panel=document.getElementById('panel-settings');
  if (!panel||!amHost) { if(panel) panel.innerHTML='<div style="padding:20px;font-size:12px;color:var(--text-dim);text-align:center;">Tylko host może zmieniać ustawienia</div>'; return; }
  const locked=state.phase!=='waiting'; const dis=locked?'disabled':'';
  const playerOptions=state.players.map(p=>'<option value="'+p.id+'">'+p.name+' ('+fmtChips(p.chips)+')</option>').join('');
  panel.innerHTML='<div class="settings-section"><div class="settings-title">⚙️ Ustawienia stołu</div>'
    +(locked?'<div class="settings-note">Zakończ rozdanie żeby zmienić</div>':'')
    +'<div class="settings-row"><label>Small Blind</label><input class="settings-input" id="set-sb" type="number" value="'+state.smallBlind+'" min="1" '+dis+'></div>'
    +'<div class="settings-row"><label>Big Blind</label><input class="settings-input" id="set-bb" type="number" value="'+state.bigBlind+'" min="2" '+dis+'></div>'
    +'<div class="settings-row"><label>Żetony startowe</label><input class="settings-input" id="set-chips" type="number" value="'+(state.startingChips||2000)+'" min="100" '+dis+'></div>'
    +'<div class="settings-row"><label>Timer (sekundy)</label><input class="settings-input" id="set-timer" type="number" value="'+(state.turnSeconds||30)+'" min="10" max="120"></div>'
    +(!locked?'<button class="btn-settings-save" onclick="saveSettings()">💾 Zapisz ustawienia</button>':'')
    +'</div>'
    +'<div class="settings-section"><div class="settings-title">💰 Daj żetony graczowi</div>'
    +'<div class="settings-row"><label>Gracz</label><select class="settings-input" id="give-player" style="width:140px;text-align:left;">'+playerOptions+'</select></div>'
    +'<div class="settings-row"><label>Kwota</label><input class="settings-input" id="give-amount" type="number" value="'+(state.startingChips||2000)+'" min="100"></div>'
    +'<div style="display:flex;gap:6px;">'+'<button class="btn-settings-save" onclick="giveChips()" style="background:var(--chip-green);color:#fff;flex:1;">➕ Dodaj</button>'+'<button class="btn-settings-save" onclick="setChips()" style="background:var(--blue);color:#fff;flex:1;">✏️ Ustaw</button>'+'</div>'
    +'</div>';
}

function saveSettings() {
  const sb=parseInt(document.getElementById('set-sb').value);
  const bb=parseInt(document.getElementById('set-bb').value);
  const chips=parseInt(document.getElementById('set-chips').value);
  const timer=parseInt(document.getElementById('set-timer')?.value||30);
  if (!sb||!bb||sb<1||bb<2) { showToast('Nieprawidłowe blindy'); return; }
  if (bb<=sb) { showToast('BB musi być większy niż SB'); return; }
  socket.emit('update_settings',{smallBlind:sb,bigBlind:bb,startingChips:chips,turnSeconds:timer});
  showToast('Zapisano!');
}
function giveChips() {
  const pid=document.getElementById('give-player').value;
  const amt=parseInt(document.getElementById('give-amount').value);
  if (!pid||!amt||amt<1) { showToast('Nieprawidłowe dane'); return; }
  socket.emit('give_chips',{playerId:pid,amount:amt});
}
function setChips() {
  const pid=document.getElementById('give-player').value;
  const amt=parseInt(document.getElementById('give-amount').value);
  if (!pid||isNaN(amt)||amt<0) { showToast('Nieprawidłowe dane'); return; }
  if (!confirm('Ustawić żetony na '+amt+' zł?'  )) return;
  socket.emit('set_chips',{playerId:pid,amount:amt});
}

function addChatMsg(msg) {
  const c=document.getElementById('chat-messages');
  const isMe=msg.senderName===myName;
  const isSystem=!msg.senderName;
  const div=document.createElement('div');
  div.className='inline-msg'+(isSystem?' system-msg':isMe?' mine-msg':'');
  if (isSystem) div.textContent=msg.text;
  else div.innerHTML='<span class="msender">'+msg.senderName+':</span>'+msg.text;
  c.appendChild(div); c.scrollTop=c.scrollHeight;
}

function sendChat() {
  const input=document.getElementById('chat-input');
  const text=input.value.trim();
  if (!text) return;
  socket.emit('chat_message',{text}); input.value='';
}

function toggleChat() {
  const chat=document.getElementById('inline-chat');
  const icon=document.getElementById('chat-toggle-icon');
  chat.classList.toggle('collapsed');
  icon.textContent=chat.classList.contains('collapsed')?'▼':'▲';
}

function switchTab(name,btn) {
  ['players','settings'].forEach(n=>document.getElementById('panel-'+n).classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  if (name==='players') document.getElementById('panel-players').classList.add('active');
  else if (name==='settings') document.getElementById('panel-settings').classList.add('active');
  document.getElementById('panel-game').style.display=(name==='game')?'flex':'none';
}

document.addEventListener('keydown', e=>{
  if (e.key==='Enter'&&document.getElementById('login-screen').style.display!=='none') joinRoom();
  if (e.key==='Enter') sendChat();
});

function showToast(msg) {
  const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),3000);
}
</script>
